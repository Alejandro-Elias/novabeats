app-id: io.github.alejandroelias.NovaBeats

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

command: run.sh
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=session-bus
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-run/gvfs
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: novabeats
    buildsystem: simple

    build-options:
      env:
        XDG_CACHE_HOME: /run/build/novabeats/flatpak-node/cache
        npm_config_cache: /run/build/novabeats/flatpak-node/npm-cache
        npm_config_offline: "false"

    build-commands:
      - npm install
      - npm run build -- --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 io.github.alejandroelias.NovaBeats.desktop /app/share/applications/io.github.alejandroelias.NovaBeats.desktop
      - install -Dm644 io.github.alejandroelias.NovaBeats.metainfo.xml /app/share/metainfo/io.github.alejandroelias.NovaBeats.metainfo.xml
      - install -Dm644 build/icon.png /app/share/icons/hicolor/512x512/apps/io.github.alejandroelias.NovaBeats.png

    sources:
      - type: dir
        path: .